<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إلى حمودي ❤️</title>

<style>
body{
margin:0;
font-family:"Cairo",sans-serif;
background:url("background.jpg") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
direction:rtl;
text-align:center;
overflow:hidden;
animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:0;
}

.card{
position:relative;
z-index:1;
background:rgba(255,255,255,0.92);
padding:40px;
border-radius:20px;
max-width:700px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{color:#ff4b5c;}

#message{
white-space:pre-line;
line-height:2;
font-size:18px;
color:#444;
min-height:350px;
}

.date{
margin-top:15px;
color:#ff4b5c;
font-weight:bold;
font-size:20px;
}

.couple{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:30px;
position:relative;
flex-wrap:wrap;
}

.person img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff4b5c;
box-shadow:0 0 25px rgba(255,75,92,0.7);
}

.name{
margin-top:10px;
color:#ff4b5c;
font-weight:bold;
}

/* قلب بينبض */
.love-heart{
font-size:40px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* خاتم بيلف */
.ring{
position:absolute;
width:350px;
height:350px;
border:2px dashed rgba(255,75,92,0.6);
border-radius:50%;
animation:rotate 12s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* قلوب طايرة */
.heart{
position:fixed;
bottom:-10px;
animation:float 6s linear infinite;
z-index:1;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="card">
<h1>إلى حمودي ❤️</h1>

<div id="message"></div>
<div class="date">3/3 💕</div>

<div class="couple">
<div class="ring"></div>

<div class="person">
<img src="boy.jpg">
<div class="name">حمودي 💙</div>
</div>

<div class="love-heart">💞</div>

<div class="person">
<img src="girl.jpg">
<div class="name">حوريتي 🤍</div>
</div>

</div>
</div>

<script>

var text=`
أولا يعني أنا بحبك بجد وكل كلمة بقولها طالعة من قلبي 💗  
إنت بالنسبة لي مش شخص عادي… إنت الأمان والضحكة والفرحة 💞  

بحب طريقتك، كلامك، غيرتك عليا، واهتمامك بيا 🥹  
بحب لما تزعقلي عشان مصلحتي، وبحب لما تدلعني 💕  

مهما حصل بينا هنفضل لبعض،  
ولو مش هبقى ليك مش هكون لغيرك 💍  

إنت اختياري كل يوم،  
وإنت الحاجة الوحيدة اللي نفسي تفضل معايا العمر كله 🏡  

3/3 مش تاريخ وخلاص…  
ده يوم قلبي اختارك فيه ❤️  

بحبك يا حمودي حب ملوش آخر ♾️  
وحوريـتك دي ليك وبس 🤍
`;

var i=0;
function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}}
typeWriter();

/* قلوب */
setInterval(function(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},400);

</script>

</body>
</html>
