<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 مفاجأة</title>

<style>
body{
margin:0;
font-family:"Cairo",sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
direction:rtl;
}

.box{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:320px;
}

input{
width:90%;
padding:10px;
margin-top:15px;
border-radius:25px;
border:1px solid #ccc;
text-align:center;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4b5c;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>🔐 ادخل كلمة السر</h2>
<input type="password" id="pass" placeholder="3/3">
<br>
<button onclick="check()">دخول</button>
</div>

<script>
function check(){
if(document.getElementById("pass").value==="3/3"){
window.location.href="love.html";
}else{
alert("كلمة السر غلط 😢");
}
}
</script>

</body>
</html>
